<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Diagnóstico de EVA</title>
</head>
<body style="font-family: Arial; padding: 20px;">
    <h2>Autopsia de Conexión - Paso 1</h2>
    <p>Abre la consola (F12) antes de dar clic.</p>
    
    <button onclick="probarWorkspace()" style="padding: 10px; margin-bottom: 10px; cursor: pointer;">
        1. Probar Ruta de Workspace
    </button>
    <br>
    <button onclick="probarGlobal()" style="padding: 10px; cursor: pointer;">
        2. Probar Ruta Global
    </button>

    <script>
        const apiKey = "RHGR7AQ-EPT4G3N-QDDDVKF-RYHAX5Q";
        
        function probarWorkspace() {
            console.log("--- PROBANDO RUTA WORKSPACE (eva-atc) ---");
            fetch("http://localhost:3001/api/v1/workspace/eva-atc/chat", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ message: "hola", mode: "chat" })
            })
            // Capturamos el texto exacto del error que manda AnythingLLM
            .then(res => res.text().then(texto => console.log(`Estatus: ${res.status} | Respuesta:`, texto)))
            .catch(e => console.error("Fallo de red o bloqueo CORS:", e));
        }

        function probarGlobal() {
            console.log("--- PROBANDO RUTA GLOBAL ---");
            fetch("http://localhost:3001/api/v1/chat", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ message: "hola", mode: "chat", workspaceSlug: "eva-atc" })
            })
            .then(res => res.text().then(texto => console.log(`Estatus: ${res.status} | Respuesta:`, texto)))
            .catch(e => console.error("Fallo de red o bloqueo CORS:", e));
        }
    </script>
</body>
</html>
