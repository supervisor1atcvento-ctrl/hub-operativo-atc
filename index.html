<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador de Slugs</title>
</head>
<body style="font-family: Arial; padding: 20px;">
    <h2>Autopsia - Fase 2: Cazando el Slug</h2>
    <p>Abre la consola (F12) y da clic en el botón.</p>
    
    <button onclick="buscarSlug()" style="padding: 10px; cursor: pointer; background: #ff6600; color: white; border: none; border-radius: 5px;">
        🔍 Revelar mi Slug Exacto
    </button>

    <script>
        const apiKey = "VY5QWDC-KE84TVZ-KE1BAET-BN6MHBE";
        
        function buscarSlug() {
            console.log("Consultando la base de datos de AnythingLLM...");
            
            // Hacemos una petición GET a la ruta de workspaces
            fetch("http://localhost:3001/api/v1/workspaces", {
                method: 'GET',
                headers: { 
                    'Authorization': `Bearer ${apiKey}`,
                    'Accept': 'application/json'
                }
            })
            .then(res => res.json())
            .then(data => {
                console.log("✅ ¡Respuesta recibida!");
                // Extraemos y mostramos los nombres y los slugs
                if(data.workspaces && data.workspaces.length > 0) {
                    data.workspaces.forEach(ws => {
                        console.log(`Nombre visible en la app: "${ws.name}"`);
                        console.log(`👉 SLUG EXACTO PARA TU CÓDIGO: "${ws.slug}"`);
                        console.log("-----------------------------------------");
                    });
                } else {
                    console.log("No se encontraron espacios de trabajo.");
                }
            })
            .catch(e => console.error("Fallo de conexión:", e));
        }
    </script>
</body>
</html>
