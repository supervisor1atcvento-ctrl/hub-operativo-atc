<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Centro de Mandos ATC — Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#0b5cff;
  --accent-2:#ff7a00;
  --muted:#6b7280;
  --bg:#f5f7fb;
  --card:#ffffff;
  --widget-bg:linear-gradient(180deg, rgba(6,12,34,0.96), rgba(10,12,16,0.95));
  --radius:14px;
  --shadow: 0 18px 50px rgba(2,6,23,0.45);
  --widget-width:360px;
  --widget-height:520px;
  --widget-collapsed-size:64px;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:linear-gradient(180deg,#f7f9fc 0%,var(--bg) 100%);font-family:Inter,system-ui,Segoe UI,Roboto,-apple-system,Arial;color:#0f1724}
.app{height:100vh;display:flex;flex-direction:column;}

/* Iframe full area */
.frame-wrap{flex:1;display:block}
.frame{
  width:100%;height:100vh;border:0;display:block;background:#fff;
}

/* Widget flotante a la derecha */
.widget {
  position:fixed;
  right:24px;
  bottom:24px;
  width:var(--widget-width);
  height:var(--widget-height);
  border-radius:var(--radius);
  background:var(--widget-bg);
  color:#fff;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  z-index:9999;
  transition:transform .22s ease, opacity .18s ease, width .18s ease, height .18s ease, border-radius .18s ease;
  cursor:grab;
}

/* Collapsed widget: circular icon, centrado y sin cortes */
.widget.collapsed{
  width:var(--widget-collapsed-size);
  height:var(--widget-collapsed-size);
  border-radius:50%;
  padding:6px;
  right:18px;
  bottom:18px;
  overflow:visible;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* Header del widget */
.widget-header{
  display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.04);
}
.widget-title{display:flex;align-items:center;gap:10px}
.widget-title .logo{
  width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;
}
.widget-title h4{margin:0;font-size:0.95rem}
.widget-controls{display:flex;gap:8px;align-items:center}

/* Botón X (ahora minimiza) */
.widget-controls .close-icon{
  width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700;
}
.widget-controls .close-icon:hover{background:rgba(255,255,255,0.06)}

/* Contenido del menú */
.widget-body{padding:12px 12px 16px 12px;overflow:auto;flex:1}
.menu-section{margin-bottom:10px}
.menu-item{
  display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:10px;background:transparent;color:#e6eefc;cursor:pointer;margin-bottom:8px;border:1px solid transparent;
}
.menu-item:hover{background:rgba(255,255,255,0.02);transform:translateY(-2px)}
.menu-item.active{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#fff;font-weight:600;border-color:rgba(255,255,255,0.04)}

/* Footer pequeño en widget */
.widget-footer{padding:10px 12px;border-top:1px solid rgba(255,255,255,0.03);font-size:0.82rem;color:rgba(255,255,255,0.7);display:flex;justify-content:space-between;align-items:center}

/* Icono visible cuando está colapsado */
.widget.collapsed .logo{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}
.widget.collapsed .widget-header,
.widget.collapsed .widget-body,
.widget.collapsed .widget-footer{display:none}

/* Drag handle when collapsed */
.widget.collapsed .drag-handle{display:block}
.drag-handle{display:none;width:100%;height:100%;cursor:grab}

/* Responsive adjustments */
@media (max-width:900px){
  .widget{right:12px;bottom:12px;width:90%;height:420px}
  .widget.collapsed{right:12px;bottom:12px}
}
</style>
</head>
<body>
<div class="app">
  <div class="frame-wrap">
    <iframe id="mainFrame" class="frame" src="https://supervisor1atcvento-ctrl.github.io/tickets_atc/" title="Contenido principal"></iframe>
  </div>
</div>

<!-- Widget flotante a la derecha -->
<aside class="widget" id="menuWidget" role="dialog" aria-label="Menú de herramientas" title="Haz clic para abrir o cerrar">
  <div class="widget-header" id="widgetHeader">
    <div class="widget-title">
      <div class="logo" id="widgetLogo">ATC</div>
      <div>
        <h4 style="margin:0">Centro de Mandos</h4>
        <div style="font-size:0.78rem;color:rgba(255,255,255,0.75)">Portal de herramientas</div>
      </div>
    </div>

    <div class="widget-controls">
      <!-- Solo el botón X, ahora minimiza/colapsa -->
      <div class="close-icon" id="closeWidget" title="Minimizar menú">✕</div>
    </div>
  </div>

  <div class="widget-body" id="widgetBody">
    <div class="menu-section" id="menuSection">
      <!-- EDITA / DUPLICA estas entradas para añadir tus páginas -->
      <div class="menu-item" data-url="https://supervisor1atcvento-ctrl.github.io/segmentador-de-agencias/" onclick="loadPage(this)">
        <span class="item-text">Segmentador ATC</span><span>➔</span>
      </div>

      <div class="menu-item" data-url="https://supervisor1atcvento-ctrl.github.io/buscador-de-cesves/" onclick="loadPage(this)">
        <span class="item-text">Buscador CESVE</span><span>➔</span>
      </div>

      <div class="menu-item" data-url="https://ayuda.vento.com/a/dashboard/73000005485" onclick="loadPage(this)">
        <span class="item-text">Dudas y FAQ</span><span>➔</span>
      </div>

      <div class="menu-item" id="menuTickets" data-url="https://supervisor1atcvento-ctrl.github.io/tickets_atc/" onclick="loadPage(this)">
        <span class="item-text">Tickets ATC</span><span>🎫</span>
      </div>
      <!-- FIN de entradas editables -->
    </div>
  </div>

  <div class="widget-footer">
    <div style="font-size:0.85rem">VENTO © 2026</div>
    <div style="font-size:0.82rem;color:rgba(255,255,255,0.7)">ATC</div>
  </div>

  <div class="drag-handle" id="dragHandle" style="display:none"></div>
</aside>

<script>
const widget = document.getElementById('menuWidget');
const widgetHeader = document.getElementById('widgetHeader');
const closeWidget = document.getElementById('closeWidget');
const mainFrame = document.getElementById('mainFrame');

let isCollapsed = false;

/* Click sobre el widget: si está colapsado, expandir; si está abierto y el click es en la cabecera, colapsar.
   Evitamos que clicks en botones o en items disparen el toggle. */
widget.addEventListener('click', function(e){
  const ignoreTags = ['BUTTON','A','INPUT','SELECT','TEXTAREA','DIV'];
  // permitir interacción normal en elementos del menú: si el click fue sobre .menu-item o dentro de botones, no togglear
  if(e.target.closest('.menu-item') || e.target.closest('.close-icon')) return;
  if(widget.classList.contains('collapsed')){
    expandWidget();
  } else {
    // Si el click fue en la cabecera (o en el borde), colapsar
    const rect = widget.getBoundingClientRect();
    const clickY = e.clientY;
    if(e.target === widget || e.target === widgetHeader || clickY < rect.top + 64){
      collapseWidget();
    }
  }
});

/* El botón X ahora minimiza/colapsa (no cierra) */
closeWidget.addEventListener('click', function(e){
  e.stopPropagation();
  if(widget.classList.contains('collapsed')){
    expandWidget();
  } else {
    collapseWidget();
  }
});

/* Funciones para colapsar/expandir */
function collapseWidget(){
  widget.classList.add('collapsed');
  isCollapsed = true;
  // mostrar drag handle si se desea (no obligatorio)
  document.getElementById('dragHandle').style.display = 'block';
  // asegurar que el widget no quede cortado en los bordes
  widget.style.overflow = 'visible';
}
function expandWidget(){
  widget.classList.remove('collapsed');
  isCollapsed = false;
  document.getElementById('dragHandle').style.display = 'none';
  widget.style.overflow = 'hidden';
}

/* Cargar página en el iframe principal */
function loadPage(el){
  document.querySelectorAll('.menu-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  const url = el.getAttribute('data-url');
  if(url){
    mainFrame.src = url;
  }
}

/* Drag simple para el widget (soporta mouse y touch) */
(function makeDraggable(el){
  let isDown = false, startX, startY, origX, origY;
  el.addEventListener('mousedown', start);
  el.addEventListener('touchstart', start, {passive:true});
  function start(e){
    // iniciar drag
    isDown = true;
    const p = getEvent(e);
    startX = p.clientX; startY = p.clientY;
    const rect = el.getBoundingClientRect();
    origX = rect.left; origY = rect.top;
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
    document.addEventListener('touchmove', move, {passive:false});
    document.addEventListener('touchend', up);
  }
  function move(e){
    if(!isDown) return;
    e.preventDefault();
    const p = getEvent(e);
    let dx = p.clientX - startX;
    let dy = p.clientY - startY;
    let newLeft = Math.max(8, origX + dx);
    let newTop = Math.max(8, origY + dy);
    // keep inside viewport
    const maxLeft = window.innerWidth - el.offsetWidth - 8;
    const maxTop = window.innerHeight - el.offsetHeight - 8;
    if(newLeft > maxLeft) newLeft = maxLeft;
    if(newTop > maxTop) newTop = maxTop;
    el.style.left = newLeft + 'px';
    el.style.top = newTop + 'px';
    el.style.right = 'auto';
    el.style.bottom = 'auto';
  }
  function up(){
    isDown = false;
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('touchend', up);
  }
  function getEvent(e){
    return e.touches ? e.touches[0] : e;
  }
})(widget);

/* Evitar que el widget quede fuera de la pantalla al redimensionar */
window.addEventListener('resize', () => {
  const rect = widget.getBoundingClientRect();
  const maxLeft = window.innerWidth - widget.offsetWidth - 8;
  const maxTop = window.innerHeight - widget.offsetHeight - 8;
  if(rect.left > maxLeft) widget.style.left = Math.max(8, maxLeft) + 'px';
  if(rect.top > maxTop) widget.style.top = Math.max(8, maxTop) + 'px';
});

/* Inicial: marcar Tickets como activo y cargar por defecto */
document.addEventListener('DOMContentLoaded', () => {
  const tickets = document.getElementById('menuTickets');
  if(tickets) tickets.classList.add('active');
  // Si quieres que inicie colapsado por defecto, descomenta la siguiente línea:
  // collapseWidget();
});
</script>
</body>
</html>
