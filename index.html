<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Centro de Mandos ATC — Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#0b5cff;
  --muted:#6b7280;
  --bg:#f5f7fb;
  --card:#ffffff;
  --sidebar:#0f1724;
  --sidebar-2:#0b1220;
  --radius:12px;
  --shadow: 0 8px 24px rgba(15,23,42,0.08);
  --sidebar-width:300px;
  --sidebar-collapsed:0px;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:linear-gradient(180deg,#f7f9fc 0%,var(--bg) 100%);font-family:Inter,system-ui,Segoe UI,Roboto,-apple-system,Arial;color:#0f1724}
.dashboard{display:flex;height:100vh;gap:24px;padding:24px;transition:all .22s ease}
.sidebar{
  width:var(--sidebar-width);min-width:var(--sidebar-width);max-width:var(--sidebar-width);
  background:linear-gradient(180deg,var(--sidebar),var(--sidebar-2));
  color:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;flex-shrink:0;transition:all .22s ease;overflow:hidden;
}
.sidebar.collapsed{
  width:var(--sidebar-collapsed);min-width:var(--sidebar-collapsed);max-width:var(--sidebar-collapsed);padding:6px 6px;
  border-radius:10px;
}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.logo{
  width:52px;height:52px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#ff7a00);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:18px;box-shadow:0 6px 18px rgba(11,92,255,0.12)
}
.brand h1{font-size:1.05rem;margin:0;font-weight:600}
.brand p{margin:0;color:rgba(255,255,255,0.85);font-size:0.85rem}

.section-title{margin-top:12px;margin-bottom:8px;color:rgba(255,255,255,0.65);font-size:0.75rem;text-transform:uppercase;letter-spacing:1px}

.menu{display:flex;flex-direction:column;gap:8px;overflow:auto;padding-right:6px}
.menu-item{
  display:flex;justify-content:space-between;align-items:center;padding:12px;border-radius:10px;background:transparent;color:rgba(255,255,255,0.95);cursor:pointer;border:1px solid transparent;transition:all .18s;
}
.menu-item:hover{background:rgba(255,255,255,0.03);transform:translateY(-2px)}
.menu-item.active{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.04);font-weight:600}

.footer{margin-top:auto;padding-top:12px;border-top:1px solid rgba(255,255,255,0.03);font-size:0.82rem;color:rgba(255,255,255,0.6);text-align:center}

/* Main area */
.main{flex:1;display:flex;flex-direction:column;gap:18px;transition:all .22s ease}
.header{display:flex;align-items:center;justify-content:space-between;padding:18px;border-radius:12px;background:var(--card);box-shadow:var(--shadow)}
.header-left{display:flex;flex-direction:column}
.header-left h2{margin:0;font-size:1.15rem}
.header-left p{margin:6px 0 0;color:var(--muted);font-size:0.9rem}

/* Collapse toggle */
.collapse-btn{
  background:transparent;border:1px solid #e6eefc;padding:8px 10px;border-radius:10px;cursor:pointer;font-weight:600;color:#0f1724;
  box-shadow:0 6px 18px rgba(11,92,255,0.04)
}

/* Content area */
.content{display:grid;grid-template-columns:1fr 520px;gap:18px;align-items:start;padding-bottom:24px;transition:all .22s ease}
.panel{background:var(--card);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
.panel h3{margin:0 0 8px 0}
.panel p{margin:0;color:var(--muted)}

/* Right frame container (tickets) */
.frame-wrap{height:calc(100vh - 170px);border-radius:10px;overflow:hidden;border:1px solid #e6eefc}
.frame{width:100%;height:100%;border:0;display:block;background:#fff}

/* When sidebar collapsed, make content full width */
.sidebar.collapsed + .main .content{grid-template-columns:1fr;}

/* Hide left panel when collapsed (menu area) */
.sidebar.collapsed .menu{display:none}
.sidebar.collapsed .brand h1,.sidebar.collapsed .brand p,.sidebar.collapsed .section-title,.sidebar.collapsed .footer{display:none}

/* Responsive */
@media (max-width:1100px){
  .content{grid-template-columns:1fr}
  .frame-wrap{height:520px}
}
</style>
</head>
<body>
<div class="dashboard">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">ATC</div>
      <div>
        <h1>Centro de Mandos</h1>
        <p>Portal de herramientas — VENTO</p>
      </div>
    </div>

    <div class="section-title">Módulos y páginas</div>
    <nav class="menu" id="menuSection">
      <div class="menu-item" data-url="https://supervisor1atcvento-ctrl.github.io/segmentador-de-agencias/" onclick="loadPage(this)">
        <span class="item-text">Segmentador ATC</span><span>➔</span>
      </div>

      <div class="menu-item" data-url="https://supervisor1atcvento-ctrl.github.io/buscador-de-cesves/" onclick="loadPage(this)">
        <span class="item-text">Buscador CESVE</span><span>➔</span>
      </div>

      <div class="menu-item" data-url="https://ayuda.vento.com/a/dashboard/73000005485" onclick="loadPage(this)">
        <span class="item-text">Dudas y FAQ</span><span>➔</span>
      </div>

      <div class="menu-item" id="menuTickets" data-url="https://supervisor1atcvento-ctrl.github.io/tickets_atc/" onclick="loadPage(this)">
        <span class="item-text">Tickets ATC</span><span>🎫</span>
      </div>
    </nav>

    <div class="footer">VENTO MOTORCYCLES © 2026</div>
  </aside>

  <main class="main">
    <div class="header">
      <div class="header-left">
        <h2>Centro de Mandos ATC</h2>
        <p>Accede a tus herramientas desde un solo lugar</p>
      </div>

      <div>
        <button class="collapse-btn" id="collapseToggle" onclick="toggleSidebar()">Minimizar menú</button>
      </div>
    </div>

    <div class="content">
      <!-- Panel izquierdo reducido: ahora solo un panel informativo compacto -->
      <section class="panel" id="leftPanel" style="display:none">
        <h3>Panel</h3>
        <p style="color:var(--muted)">Este espacio se usa para información adicional si la necesitas.</p>
      </section>

      <aside class="panel frame-wrap" id="rightPanel">
        <!-- Carga por defecto el frame de Tickets -->
        <iframe id="mainFrame" class="frame" src="https://supervisor1atcvento-ctrl.github.io/tickets_atc/" title="Contenido"></iframe>
      </aside>
    </div>
  </main>
</div>

<script>
/* Toggle sidebar collapse/expand */
function toggleSidebar(){
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('collapseToggle');
  sidebar.classList.toggle('collapsed');
  const collapsed = sidebar.classList.contains('collapsed');
  btn.innerText = collapsed ? 'Expandir menú' : 'Minimizar menú';
  // Ajuste de accesibilidad: si colapsado, ocultar panel izquierdo (opcional)
  const leftPanel = document.getElementById('leftPanel');
  if(leftPanel) leftPanel.style.display = collapsed ? 'none' : 'block';
}

/* Cargar página en el iframe derecho */
function loadPage(el){
  document.querySelectorAll('.menu-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  const url = el.getAttribute('data-url');
  const frame = document.getElementById('mainFrame');
  // Si la URL es la de tickets, la cargamos (ya es la por defecto)
  if(url){
    frame.src = url;
  }
}

/* Helper para añadir entradas dinámicamente */
function addMenuItem(title, url){
  const nav = document.getElementById('menuSection');
  const div = document.createElement('div');
  div.className = 'menu-item';
  div.setAttribute('data-url', url);
  div.onclick = function(){ loadPage(div); };
  div.innerHTML = '<span class="item-text">'+title+'</span><span>➔</span>';
  nav.appendChild(div);
}

/* Inicial: marcar Tickets como activo */
document.addEventListener('DOMContentLoaded', function(){
  const tickets = document.getElementById('menuTickets');
  if(tickets) tickets.classList.add('active');
});
</script>
</body>
</html>
